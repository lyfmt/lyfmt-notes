<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>文章详情 — lyfmt's Notes</title>
    <meta
      name="description"
      content="文章详情页，运行时从 articles.json 加载文章内容。"
    />
    <link rel="stylesheet" href="./styles.css?v=20260311-1" />
    <script src="./script.js?v=20260311-1" defer></script>
  </head>
  <body data-page="post">
    <header class="site-header">
      <div class="site-header__inner">
        <a class="site-brand" href="./index.html">lyfmt's Notes</a>

        <div class="site-header__right">
          <nav class="top-nav" aria-label="Primary">
            <a href="./index.html">Home</a>
            <a href="./index.html#featured-post">Featured</a>
            <a href="./index.html#authors">Authors</a>
            <a href="./index.html#latest-posts-title">Archive</a>
          </nav>

          <button id="theme-toggle" type="button" aria-label="切换主题">切换主题</button>
        </div>
      </div>
    </header>

    <main class="page-shell">
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="./index.html">← 返回首页</a>
      </nav>

      <div class="article-layout">
        <div class="article-main">
          <div id="post-view-switcher" class="post-view-switcher" aria-live="polite"></div>

          <article id="post-article" class="article-shell" aria-live="polite" aria-busy="true">
            <section class="empty-state">
              <h2>正在加载文章详情</h2>
              <p>页面将根据 URL 参数中的 slug 从 <code>articles.json</code> 加载内容。</p>
            </section>
          </article>
        </div>
      </div>
    </main>
  </body>
</html>
