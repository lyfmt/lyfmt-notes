<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agent Notes Demo</title>
    <meta
      name="description"
      content="一个真正多页的静态 blog demo，包含首页卡片页与文章详情页。"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./script.js" defer></script>
  </head>
  <body data-page="home">
    <header class="site-header">
      <div class="site-header__inner">
        <a class="site-brand" href="./index.html">Agent Notes Demo</a>
        <button id="theme-toggle" type="button" aria-label="切换主题">切换主题</button>
      </div>
    </header>

    <main class="page-shell">
      <section class="hero hero--home" aria-labelledby="home-title">
        <p class="eyebrow">Multi-page blog demo</p>
        <h1 id="home-title">Agent Notes Demo</h1>
        <p id="home-description" class="hero__text">
          这是一个真正多页的 blog 演示：首页展示文章卡片流，点击后进入独立文章详情页。
        </p>
      </section>

      <section class="section-head" aria-labelledby="latest-posts-title">
        <div>
          <p class="eyebrow eyebrow--muted">Homepage cards</p>
          <h2 id="latest-posts-title">Latest posts</h2>
          <p class="section-copy">卡片页负责概览、筛读和跳转；详情页负责完整阅读。</p>
        </div>
        <p id="post-count" class="section-badge">正在加载…</p>
      </section>

      <section id="home-posts" class="card-grid" aria-live="polite" aria-busy="true">
        <article class="empty-state">
          <h3>正在加载文章</h3>
          <p>页面将从 <code>articles.json</code> 读取文章数据并渲染首页卡片。</p>
        </article>
      </section>
    </main>
  </body>
</html>
